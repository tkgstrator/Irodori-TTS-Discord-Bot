<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>キャラクター管理 - リスト (Mobile)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&amp;display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Geist', 'sans-serif'] },
          colors: {
            background: 'var(--background)', foreground: 'var(--foreground)',
            card: 'var(--card)', 'card-foreground': 'var(--card-foreground)',
            primary: 'var(--primary)', 'primary-foreground': 'var(--primary-foreground)',
            secondary: 'var(--secondary)', 'secondary-foreground': 'var(--secondary-foreground)',
            muted: 'var(--muted)', 'muted-foreground': 'var(--muted-foreground)',
            accent: 'var(--accent)', 'accent-foreground': 'var(--accent-foreground)',
            destructive: 'var(--destructive)',
            border: 'var(--border)', input: 'var(--input)', ring: 'var(--ring)',
          },
          borderRadius: { xl: 'calc(var(--radius) * 1.4)' }
        }
      }
    }
  </script>
  <style>
    :root {
      --background: oklch(1 0 0); --foreground: oklch(0.145 0 0);
      --card: oklch(1 0 0); --card-foreground: oklch(0.145 0 0);
      --primary: oklch(0.205 0 0); --primary-foreground: oklch(0.985 0 0);
      --secondary: oklch(0.97 0 0); --secondary-foreground: oklch(0.205 0 0);
      --muted: oklch(0.97 0 0); --muted-foreground: oklch(0.556 0 0);
      --accent: oklch(0.97 0 0); --accent-foreground: oklch(0.205 0 0);
      --destructive: oklch(0.577 0.245 27.325);
      --border: oklch(0.922 0 0); --input: oklch(0.922 0 0);
      --ring: oklch(0.708 0 0); --radius: 0.625rem;
    }
    .dark {
      --background: oklch(0.145 0 0); --foreground: oklch(0.985 0 0);
      --card: oklch(0.205 0 0); --card-foreground: oklch(0.985 0 0);
      --primary: oklch(0.922 0 0); --primary-foreground: oklch(0.205 0 0);
      --secondary: oklch(0.269 0 0); --secondary-foreground: oklch(0.985 0 0);
      --muted: oklch(0.269 0 0); --muted-foreground: oklch(0.708 0 0);
      --accent: oklch(0.269 0 0); --accent-foreground: oklch(0.985 0 0);
      --destructive: oklch(0.704 0.191 22.216);
      --border: oklch(1 0 0 / 10%); --input: oklch(1 0 0 / 15%);
      --ring: oklch(0.556 0 0);
    }
    body { font-family: 'Geist', sans-serif; background: var(--background); color: var(--foreground); }
    .tap-row:active { background: var(--muted); }
    .tap-row { transition: background 0.1s; cursor: pointer; }
  </style>
</head>
<body class="min-h-screen bg-muted/30">
  <div class="max-w-[390px] mx-auto min-h-screen flex flex-col bg-background">

    <!-- Top bar -->
    <div class="flex items-center gap-2 px-4 pt-6 pb-2">
      <a href="index.html" class="inline-flex size-8 items-center justify-center rounded-full text-muted-foreground hover:text-foreground hover:bg-muted transition-colors flex-shrink-0">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
      </a>
      <div class="flex-1">
        <h1 class="text-base font-semibold leading-tight">キャラクター管理</h1>
      </div>
    </div>

    <!-- Search bar -->
    <div class="px-4 pb-4">
      <div class="relative">
        <svg class="absolute left-3 top-1/2 -translate-y-1/2 text-muted-foreground" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input
          type="text"
          placeholder="名前で検索..."
          class="w-full h-10 pl-9 pr-3 text-sm rounded-xl border border-border bg-card text-foreground placeholder:text-muted-foreground focus:outline-none focus:ring-2 focus:ring-ring"
        />
      </div>
    </div>

    <!-- List container -->
    <div class="mx-4 rounded-xl border border-border bg-card ring-1 ring-foreground/5 overflow-hidden flex-1">

      <!-- Row 1: 朝日 陽太 -->
      <div class="tap-row flex items-center gap-3 px-4 border-b border-border" style="min-height:64px">
        <div class="size-9 rounded-full bg-primary text-primary-foreground flex items-center justify-center text-sm font-semibold flex-shrink-0">陽</div>
        <div class="flex-1 min-w-0 py-3">
          <div class="flex items-center gap-2">
            <span class="font-semibold text-sm">朝日 陽太</span>
            <span class="inline-flex items-center px-1.5 py-0.5 rounded-full text-xs font-medium bg-primary/10 text-primary">主人公</span>
          </div>
          <p class="text-xs text-muted-foreground mt-0.5">男性 · 17歳 · 音声設定済み</p>
        </div>
        <svg class="text-muted-foreground flex-shrink-0" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
      </div>

      <!-- Row 2: 月城 凛 -->
      <div class="tap-row flex items-center gap-3 px-4 border-b border-border" style="min-height:64px">
        <div class="size-9 rounded-full bg-primary text-primary-foreground flex items-center justify-center text-sm font-semibold flex-shrink-0">月</div>
        <div class="flex-1 min-w-0 py-3">
          <div class="flex items-center gap-2">
            <span class="font-semibold text-sm">月城 凛</span>
            <span class="inline-flex items-center px-1.5 py-0.5 rounded-full text-xs font-medium bg-primary/10 text-primary">ヒロイン</span>
          </div>
          <p class="text-xs text-muted-foreground mt-0.5">女性 · 17歳 · 音声設定済み</p>
        </div>
        <svg class="text-muted-foreground flex-shrink-0" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
      </div>

      <!-- Row 3: 蒼井 大和 -->
      <div class="tap-row flex items-center gap-3 px-4 border-b border-border" style="min-height:64px">
        <div class="size-9 rounded-full bg-secondary text-secondary-foreground flex items-center justify-center text-sm font-semibold flex-shrink-0">蒼</div>
        <div class="flex-1 min-w-0 py-3">
          <div class="flex items-center gap-2">
            <span class="font-semibold text-sm">蒼井 大和</span>
            <span class="inline-flex items-center px-1.5 py-0.5 rounded-full text-xs font-medium bg-secondary text-secondary-foreground">サブキャラ</span>
          </div>
          <p class="text-xs text-muted-foreground mt-0.5">男性 · 17歳 · 音声設定済み</p>
        </div>
        <svg class="text-muted-foreground flex-shrink-0" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
      </div>

      <!-- Row 4: 紅林 アカネ -->
      <div class="tap-row flex items-center gap-3 px-4 border-b border-border" style="min-height:64px">
        <div class="size-9 rounded-full bg-destructive/10 text-destructive flex items-center justify-center text-sm font-semibold flex-shrink-0">紅</div>
        <div class="flex-1 min-w-0 py-3">
          <div class="flex items-center gap-2">
            <span class="font-semibold text-sm">紅林 アカネ</span>
            <span class="inline-flex items-center px-1.5 py-0.5 rounded-full text-xs font-medium bg-destructive/10 text-destructive">敵キャラ</span>
          </div>
          <p class="text-xs text-muted-foreground mt-0.5">女性 · 16歳 · 音声設定済み</p>
        </div>
        <svg class="text-muted-foreground flex-shrink-0" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
      </div>

      <!-- Row 5: 白石 先生 -->
      <div class="tap-row flex items-center gap-3 px-4 border-b border-border" style="min-height:64px">
        <div class="size-9 rounded-full bg-secondary text-secondary-foreground flex items-center justify-center text-sm font-semibold flex-shrink-0">白</div>
        <div class="flex-1 min-w-0 py-3">
          <div class="flex items-center gap-2">
            <span class="font-semibold text-sm">白石 先生</span>
            <span class="inline-flex items-center px-1.5 py-0.5 rounded-full text-xs font-medium bg-secondary text-secondary-foreground">サブキャラ</span>
          </div>
          <p class="text-xs text-muted-foreground mt-0.5">男性 · 34歳 · 音声未設定</p>
        </div>
        <svg class="text-muted-foreground flex-shrink-0" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
      </div>

      <!-- Row 6: 雪村 ユキ -->
      <div class="tap-row flex items-center gap-3 px-4" style="min-height:64px">
        <div class="size-9 rounded-full bg-primary/10 text-primary flex items-center justify-center text-sm font-semibold flex-shrink-0">雪</div>
        <div class="flex-1 min-w-0 py-3">
          <div class="flex items-center gap-2">
            <span class="font-semibold text-sm">雪村 ユキ</span>
            <span class="inline-flex items-center px-1.5 py-0.5 rounded-full text-xs font-medium bg-primary/10 text-primary">ヒロイン</span>
          </div>
          <p class="text-xs text-muted-foreground mt-0.5">女性 · 16歳 · 音声未設定</p>
        </div>
        <svg class="text-muted-foreground flex-shrink-0" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
      </div>

    </div>

    <!-- Count -->
    <p class="text-xs text-muted-foreground px-4 mt-3 mb-24">6件のキャラクター</p>

  </div>

  <!-- FAB -->
  <button class="fixed bottom-6 right-1/2 translate-x-[195px] inline-flex size-14 items-center justify-center rounded-full bg-primary text-primary-foreground shadow-lg hover:opacity-90 transition-opacity" title="新規作成">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
  </button>

  <!-- Dark mode toggle -->
  <button onclick="document.documentElement.classList.toggle('dark')" class="fixed bottom-6 left-4 inline-flex size-9 items-center justify-center rounded-full border border-border bg-card text-foreground shadow-sm hover:bg-secondary" title="テーマ切替">
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
  </button>
</body>
</html>
