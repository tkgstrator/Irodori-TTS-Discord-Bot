services:
  app:
    build:
      context: ../..
      dockerfile: workers/bot/Dockerfile
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN}
    depends_on:
      redis:
        condition: service_healthy
      irodori-tts:
        condition: service_healthy
    stdin_open: true
    tty: true

  irodori-tts:
    image: tkgling/irodori-tts:latest
    volumes:
      - ./configs/config.yaml:/app/config.yaml:ro
      - ./models:/app/models:ro
      - hf_cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8765/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 300s

  redis:
    image: redis:8.4.0
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis_data:
    name: redis_data
  hf_cache:
    driver: local
