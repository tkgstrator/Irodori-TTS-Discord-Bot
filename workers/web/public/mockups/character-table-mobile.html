<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>キャラクター管理 - テーブル (Mobile)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&amp;display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Geist', 'sans-serif'] },
          colors: {
            background: 'var(--background)', foreground: 'var(--foreground)',
            card: 'var(--card)', 'card-foreground': 'var(--card-foreground)',
            primary: 'var(--primary)', 'primary-foreground': 'var(--primary-foreground)',
            secondary: 'var(--secondary)', 'secondary-foreground': 'var(--secondary-foreground)',
            muted: 'var(--muted)', 'muted-foreground': 'var(--muted-foreground)',
            accent: 'var(--accent)', 'accent-foreground': 'var(--accent-foreground)',
            destructive: 'var(--destructive)',
            border: 'var(--border)', input: 'var(--input)', ring: 'var(--ring)',
          },
          borderRadius: { xl: 'calc(var(--radius) * 1.4)' }
        }
      }
    }
  </script>
  <style>
    :root {
      --background: oklch(1 0 0); --foreground: oklch(0.145 0 0);
      --card: oklch(1 0 0); --card-foreground: oklch(0.145 0 0);
      --primary: oklch(0.205 0 0); --primary-foreground: oklch(0.985 0 0);
      --secondary: oklch(0.97 0 0); --secondary-foreground: oklch(0.205 0 0);
      --muted: oklch(0.97 0 0); --muted-foreground: oklch(0.556 0 0);
      --accent: oklch(0.97 0 0); --accent-foreground: oklch(0.205 0 0);
      --destructive: oklch(0.577 0.245 27.325);
      --border: oklch(0.922 0 0); --input: oklch(0.922 0 0);
      --ring: oklch(0.708 0 0); --radius: 0.625rem;
    }
    .dark {
      --background: oklch(0.145 0 0); --foreground: oklch(0.985 0 0);
      --card: oklch(0.205 0 0); --card-foreground: oklch(0.985 0 0);
      --primary: oklch(0.922 0 0); --primary-foreground: oklch(0.205 0 0);
      --secondary: oklch(0.269 0 0); --secondary-foreground: oklch(0.985 0 0);
      --muted: oklch(0.269 0 0); --muted-foreground: oklch(0.708 0 0);
      --accent: oklch(0.269 0 0); --accent-foreground: oklch(0.985 0 0);
      --destructive: oklch(0.704 0.191 22.216);
      --border: oklch(1 0 0 / 10%); --input: oklch(1 0 0 / 15%);
      --ring: oklch(0.556 0 0);
    }
    body { font-family: 'Geist', sans-serif; background: var(--background); color: var(--foreground); }
  </style>
</head>
<body class="min-h-screen">
  <div class="mx-auto max-w-[390px] px-4 py-6">

    <a href="index.html" class="mb-5 inline-flex items-center gap-1.5 text-sm text-muted-foreground transition-colors hover:text-foreground">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      一覧に戻る
    </a>

    <!-- Page header -->
    <div class="mb-4">
      <h1 class="text-xl font-bold tracking-tight">キャラクター管理</h1>
      <p class="mt-0.5 text-xs text-muted-foreground">登録済みキャラクターの一覧・編集</p>
    </div>

    <!-- Search bar -->
    <div class="mb-4 relative">
      <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="absolute left-3 top-1/2 -translate-y-1/2 text-muted-foreground"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" placeholder="キャラクターを検索…" class="h-10 w-full rounded-[var(--radius)] border border-input bg-background pl-9 pr-3 text-sm text-foreground placeholder:text-muted-foreground focus:outline-none focus:ring-2 focus:ring-ring" />
    </div>

    <!-- Card list -->
    <div class="overflow-hidden rounded-xl border border-border bg-card ring-1 ring-foreground/5 divide-y divide-border">

      <!-- 朝日 陽太 -->
      <button class="flex w-full items-center gap-3 px-4 py-3.5 text-left transition-colors hover:bg-muted/50 active:bg-muted">
        <div class="flex size-10 shrink-0 items-center justify-center rounded-full bg-primary text-primary-foreground text-sm font-semibold">陽</div>
        <div class="min-w-0 flex-1">
          <div class="flex items-center gap-2">
            <p class="text-sm font-medium text-foreground">朝日 陽太</p>
            <span class="inline-flex items-center rounded-full bg-primary/10 px-2 py-0.5 text-xs font-medium text-primary">主人公</span>
          </div>
          <p class="mt-0.5 truncate text-xs text-muted-foreground">明るく前向きな高校2年生。何事にも全力で取り組む姿勢が周囲を巻き込んでいく。</p>
          <div class="mt-1 flex items-center gap-2">
            <span class="text-xs text-muted-foreground">男性・17歳</span>
            <span class="inline-flex items-center gap-0.5 text-xs text-muted-foreground">
              <svg xmlns="http://www.w3.org/2000/svg" width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
              音声設定済み
            </span>
          </div>
        </div>
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="shrink-0 text-muted-foreground"><polyline points="9 18 15 12 9 6"/></svg>
      </button>

      <!-- 月城 凛 -->
      <button class="flex w-full items-center gap-3 px-4 py-3.5 text-left transition-colors hover:bg-muted/50 active:bg-muted">
        <div class="flex size-10 shrink-0 items-center justify-center rounded-full bg-primary text-primary-foreground text-sm font-semibold">月</div>
        <div class="min-w-0 flex-1">
          <div class="flex items-center gap-2">
            <p class="text-sm font-medium text-foreground">月城 凛</p>
            <span class="inline-flex items-center rounded-full bg-primary/10 px-2 py-0.5 text-xs font-medium text-primary">ヒロイン</span>
          </div>
          <p class="mt-0.5 truncate text-xs text-muted-foreground">冷静沈着な生徒会長。表面上はクールだが、仲間想いの一面を持つ。</p>
          <div class="mt-1 flex items-center gap-2">
            <span class="text-xs text-muted-foreground">女性・17歳</span>
            <span class="inline-flex items-center gap-0.5 text-xs text-muted-foreground">
              <svg xmlns="http://www.w3.org/2000/svg" width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
              音声設定済み
            </span>
          </div>
        </div>
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="shrink-0 text-muted-foreground"><polyline points="9 18 15 12 9 6"/></svg>
      </button>

      <!-- 蒼井 大和 -->
      <button class="flex w-full items-center gap-3 px-4 py-3.5 text-left transition-colors hover:bg-muted/50 active:bg-muted">
        <div class="flex size-10 shrink-0 items-center justify-center rounded-full bg-primary text-primary-foreground text-sm font-semibold">蒼</div>
        <div class="min-w-0 flex-1">
          <div class="flex items-center gap-2">
            <p class="text-sm font-medium text-foreground">蒼井 大和</p>
            <span class="inline-flex items-center rounded-full bg-secondary px-2 py-0.5 text-xs font-medium text-secondary-foreground">サブキャラ</span>
          </div>
          <p class="mt-0.5 truncate text-xs text-muted-foreground">陽太の幼馴染でムードメーカー。コミカルな言動の裏に鋭い洞察力を隠す。</p>
          <div class="mt-1 flex items-center gap-2">
            <span class="text-xs text-muted-foreground">男性・17歳</span>
            <span class="inline-flex items-center gap-0.5 text-xs text-muted-foreground">
              <svg xmlns="http://www.w3.org/2000/svg" width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
              音声設定済み
            </span>
          </div>
        </div>
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="shrink-0 text-muted-foreground"><polyline points="9 18 15 12 9 6"/></svg>
      </button>

      <!-- 紅林 アカネ -->
      <button class="flex w-full items-center gap-3 px-4 py-3.5 text-left transition-colors hover:bg-muted/50 active:bg-muted">
        <div class="flex size-10 shrink-0 items-center justify-center rounded-full bg-destructive/20 text-destructive text-sm font-semibold">紅</div>
        <div class="min-w-0 flex-1">
          <div class="flex items-center gap-2">
            <p class="text-sm font-medium text-foreground">紅林 アカネ</p>
            <span class="inline-flex items-center rounded-full bg-destructive/10 px-2 py-0.5 text-xs font-medium text-destructive">敵キャラ</span>
          </div>
          <p class="mt-0.5 truncate text-xs text-muted-foreground">謎多き転校生。目的は不明だが、陽太たちの行動を監視しているようだ。</p>
          <div class="mt-1 flex items-center gap-2">
            <span class="text-xs text-muted-foreground">女性・16歳</span>
            <span class="inline-flex items-center gap-0.5 text-xs text-muted-foreground">
              <svg xmlns="http://www.w3.org/2000/svg" width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
              音声設定済み
            </span>
          </div>
        </div>
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="shrink-0 text-muted-foreground"><polyline points="9 18 15 12 9 6"/></svg>
      </button>

      <!-- 白石 先生 -->
      <button class="flex w-full items-center gap-3 px-4 py-3.5 text-left transition-colors hover:bg-muted/50 active:bg-muted">
        <div class="flex size-10 shrink-0 items-center justify-center rounded-full bg-primary text-primary-foreground text-sm font-semibold">白</div>
        <div class="min-w-0 flex-1">
          <div class="flex items-center gap-2">
            <p class="text-sm font-medium text-foreground">白石 先生</p>
            <span class="inline-flex items-center rounded-full bg-secondary px-2 py-0.5 text-xs font-medium text-secondary-foreground">サブキャラ</span>
          </div>
          <p class="mt-0.5 truncate text-xs text-muted-foreground">担任教師。生徒に寄り添う温厚な性格だが、かつては別の顔を持っていた。</p>
          <div class="mt-1 flex items-center gap-2">
            <span class="text-xs text-muted-foreground">男性・34歳</span>
            <span class="inline-flex items-center gap-0.5 text-xs text-muted-foreground/60">
              <svg xmlns="http://www.w3.org/2000/svg" width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>
              音声未設定
            </span>
          </div>
        </div>
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="shrink-0 text-muted-foreground"><polyline points="9 18 15 12 9 6"/></svg>
      </button>

      <!-- 雪村 ユキ -->
      <button class="flex w-full items-center gap-3 px-4 py-3.5 text-left transition-colors hover:bg-muted/50 active:bg-muted">
        <div class="flex size-10 shrink-0 items-center justify-center rounded-full bg-primary text-primary-foreground text-sm font-semibold">雪</div>
        <div class="min-w-0 flex-1">
          <div class="flex items-center gap-2">
            <p class="text-sm font-medium text-foreground">雪村 ユキ</p>
            <span class="inline-flex items-center rounded-full bg-primary/10 px-2 py-0.5 text-xs font-medium text-primary">ヒロイン</span>
          </div>
          <p class="mt-0.5 truncate text-xs text-muted-foreground">図書委員の物静かな少女。本の世界に没頭しがちだが、意外な行動力を秘めている。</p>
          <div class="mt-1 flex items-center gap-2">
            <span class="text-xs text-muted-foreground">女性・16歳</span>
            <span class="inline-flex items-center gap-0.5 text-xs text-muted-foreground/60">
              <svg xmlns="http://www.w3.org/2000/svg" width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>
              音声未設定
            </span>
          </div>
        </div>
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="shrink-0 text-muted-foreground"><polyline points="9 18 15 12 9 6"/></svg>
      </button>

    </div>

    <p class="mt-3 text-center text-xs text-muted-foreground">1–6 / 6件</p>

    <!-- Bottom padding for FAB -->
    <div class="h-20"></div>
  </div>

  <!-- FAB -->
  <button class="fixed bottom-6 right-6 inline-flex size-14 items-center justify-center rounded-full bg-primary text-primary-foreground shadow-lg transition-opacity hover:opacity-90 active:scale-95" title="新規作成">
    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </button>

  <button onclick="document.documentElement.classList.toggle('dark')" class="fixed bottom-6 left-6 inline-flex size-9 items-center justify-center rounded-full border border-border bg-card text-foreground shadow-sm hover:bg-secondary" title="テーマ切替">
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
  </button>
</body>
</html>
